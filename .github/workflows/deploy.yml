name: Deploy to AWS

on:
  push:
    branches: [main]

# ── What each job does ──────────────────────────────────────────
# deploy-api    → SSH into EC2, git pull, migrate, pm2 restart
# deploy-client → Build React, sync to S3, invalidate CloudFront
# deploy-admin  → Build React, sync to S3, invalidate CloudFront

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  JOB 1 — Deploy API server to EC2
  # ═══════════════════════════════════════════════════════════════
  deploy-api:
    name: Deploy API → EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          timeout:     120s
          script: |
            set -e
            echo "── Pulling latest code ──"
            cd /home/ubuntu/pern-todo
            git pull origin main

            echo "── Installing dependencies ──"
            cd server
            npm install --omit=dev

            echo "── Generating Prisma client ──"
            npx prisma generate

            echo "── Running migrations ──"
            npx prisma migrate deploy

            echo "── Restarting PM2 ──"
            pm2 restart pern-api || pm2 start ecosystem.config.js
            pm2 save

            echo "── Health check ──"
            sleep 3
            curl -f http://localhost:4000/health || exit 1
            echo "✅ API deployed successfully"

  # ═══════════════════════════════════════════════════════════════
  #  JOB 2 — Build & deploy client-app to S3 + CloudFront
  # ═══════════════════════════════════════════════════════════════
  deploy-client:
    name: Deploy client-app → S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client-app/package-lock.json

      - name: Install dependencies
        working-directory: client-app
        run: npm ci

      - name: Build React app
        working-directory: client-app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync client-app/dist/ s3://${{ secrets.S3_BUCKET_CLIENT }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

          # index.html must NOT be cached (so new deploys take effect immediately)
          aws s3 cp client-app/dist/index.html s3://${{ secrets.S3_BUCKET_CLIENT }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_CLIENT }} \
            --paths "/*"

  # ═══════════════════════════════════════════════════════════════
  #  JOB 3 — Build & deploy admin-dashboard to S3 + CloudFront
  # ═══════════════════════════════════════════════════════════════
  deploy-admin:
    name: Deploy admin-dashboard → S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: admin-dashboard
        run: npm ci

      - name: Build React app
        working-directory: admin-dashboard
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync admin-dashboard/dist/ s3://${{ secrets.S3_BUCKET_ADMIN }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

          aws s3 cp admin-dashboard/dist/index.html s3://${{ secrets.S3_BUCKET_ADMIN }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ADMIN }} \
            --paths "/*"
